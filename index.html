<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <section class="calculator" aria-label="Calculator">
        <header class="calculator__header">
          <h1 id="app-title">Calculator</h1>
        </header>

        <div class="calculator__readout">
          <span
            class="calculator__memory-indicator"
            id="memory-indicator"
            aria-label="Memory contains a value"
            hidden
          >
            M
          </span>
          <output
            class="calculator__display"
            id="calculator-display"
            aria-live="polite"
            aria-label="Calculator display"
          >
            0
          </output>
        </div>

        <div class="calculator__controls" role="group" aria-label="Calculator controls">
          <div class="calculator__memory" role="group" aria-label="Memory controls">
            <button type="button" data-action="memory-add" aria-label="Add display value to memory">M+</button>
            <button type="button" data-action="memory-subtract" aria-label="Subtract display value from memory">M−</button>
            <button type="button" data-action="memory-recall" aria-label="Recall memory value">MR</button>
          </div>

          <div class="calculator__utilities" role="group" aria-label="Utility controls">
            <button type="button" data-action="clear" aria-label="Clear calculator">C</button>
            <button type="button" data-action="percent" aria-label="Percent">%</button>
          </div>

          <div class="calculator__operators" role="group" aria-label="Operator controls">
            <button type="button" data-action="operator" data-operator="divide" aria-label="Divide">÷</button>
            <button type="button" data-action="operator" data-operator="multiply" aria-label="Multiply">×</button>
            <button type="button" data-action="operator" data-operator="subtract" aria-label="Subtract">−</button>
            <button type="button" data-action="operator" data-operator="add" aria-label="Add">+</button>
            <button type="button" data-action="equals" aria-label="Equals">=</button>
          </div>

          <div class="calculator__keypad" role="group" aria-label="Number pad">
            <button type="button" data-action="digit" data-value="7" aria-label="Seven">7</button>
            <button type="button" data-action="digit" data-value="8" aria-label="Eight">8</button>
            <button type="button" data-action="digit" data-value="9" aria-label="Nine">9</button>
            <button type="button" data-action="digit" data-value="4" aria-label="Four">4</button>
            <button type="button" data-action="digit" data-value="5" aria-label="Five">5</button>
            <button type="button" data-action="digit" data-value="6" aria-label="Six">6</button>
            <button type="button" data-action="digit" data-value="1" aria-label="One">1</button>
            <button type="button" data-action="digit" data-value="2" aria-label="Two">2</button>
            <button type="button" data-action="digit" data-value="3" aria-label="Three">3</button>
            <button type="button" data-action="digit" data-value="0" aria-label="Zero">0</button>
            <button type="button" data-action="decimal" aria-label="Decimal point">.</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
