<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <section class="calculator" aria-labelledby="app-title">
        <header class="calculator__header">
          <h1 id="app-title">Calculator</h1>
        </header>

        <div class="calculator__readout">
          <span
            class="calculator__memory-indicator"
            id="memory-indicator"
            aria-label="Memory contains a value"
            hidden
          >
            M
          </span>
          <output
            class="calculator__display"
            id="calculator-display"
            aria-live="polite"
            aria-atomic="true"
            aria-label="Calculator display"
          >
            0
          </output>
        </div>

        <div class="calculator__controls" role="group" aria-label="Calculator controls">
          <div class="calculator__memory" role="group" aria-label="Memory controls">
            <button type="button" data-action="memory-add" aria-label="Add display value to memory">M+</button>
            <button type="button" data-action="memory-subtract" aria-label="Subtract display value from memory">M−</button>
            <button type="button" data-action="memory-recall" aria-label="Recall memory value">MR</button>
          </div>

          <div class="calculator__utilities" role="group" aria-label="Utility controls">
            <button type="button" data-action="clear" aria-label="Clear calculator" aria-keyshortcuts="Escape C">C</button>
            <button type="button" data-action="percent" aria-label="Percent" aria-keyshortcuts="%">%</button>
          </div>

          <div class="calculator__operators" role="group" aria-label="Operator controls">
            <button type="button" data-action="operator" data-operator="divide" aria-label="Divide" aria-keyshortcuts="/">÷</button>
            <button type="button" data-action="operator" data-operator="multiply" aria-label="Multiply" aria-keyshortcuts="*">×</button>
            <button type="button" data-action="operator" data-operator="subtract" aria-label="Subtract" aria-keyshortcuts="-">−</button>
            <button type="button" data-action="operator" data-operator="add" aria-label="Add" aria-keyshortcuts="+">+</button>
            <button type="button" data-action="equals" aria-label="Equals" aria-keyshortcuts="Enter =">=</button>
          </div>

          <div class="calculator__keypad" role="group" aria-label="Number pad">
            <button type="button" data-action="digit" data-value="7" aria-label="Seven" aria-keyshortcuts="7">7</button>
            <button type="button" data-action="digit" data-value="8" aria-label="Eight" aria-keyshortcuts="8">8</button>
            <button type="button" data-action="digit" data-value="9" aria-label="Nine" aria-keyshortcuts="9">9</button>
            <button type="button" data-action="digit" data-value="4" aria-label="Four" aria-keyshortcuts="4">4</button>
            <button type="button" data-action="digit" data-value="5" aria-label="Five" aria-keyshortcuts="5">5</button>
            <button type="button" data-action="digit" data-value="6" aria-label="Six" aria-keyshortcuts="6">6</button>
            <button type="button" data-action="digit" data-value="1" aria-label="One" aria-keyshortcuts="1">1</button>
            <button type="button" data-action="digit" data-value="2" aria-label="Two" aria-keyshortcuts="2">2</button>
            <button type="button" data-action="digit" data-value="3" aria-label="Three" aria-keyshortcuts="3">3</button>
            <button type="button" data-action="digit" data-value="0" aria-label="Zero" aria-keyshortcuts="0">0</button>
            <button type="button" data-action="decimal" aria-label="Decimal point" aria-keyshortcuts=".">.</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
